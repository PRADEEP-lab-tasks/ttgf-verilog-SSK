# Tiny Tapeout project information
project:
  title:        "AND Gate"       # Project title
  author:       "Your Name"      # Your name
  discord:      ""               # Optional: your Discord username
  description:  "A simple 2-input AND gate using TTGF wrapper" 
  language:     "Verilog"        # HDL used
  clock_hz:     0                # No clock needed for combinational logic

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"                   # Smallest footprint

  # Your top module name must start with "tt_um_". 
  top_module:  "tt_um_and_gate"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. 
# Use descriptive names for clarity.
pinout:
  # Inputs
  ui[0]: "A"       # First AND input
  ui[1]: "B"       # Second AND input
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Y"       # AND output
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
